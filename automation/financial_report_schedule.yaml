# 财务报表定时下载配置
# 
# 使用方法：
# 在 Claude Code 中使用 automation_update 工具创建定时任务
# 参考 QUICKSTART_FINANCIAL_REPORTS.md

# ========================================
# 季度财报下载（推荐）
# ========================================

季度财报下载:
  name: 季度财务报表自动下载
  schedule: "FREQ=QUARTERLY;BYMONTH=1,4,7,10;BYMONTHDAY=15;BYHOUR=20;BYMINUTE=0"  # 每季度中旬20:00执行
  prompt: |
    执行季度财务报表下载任务：
    
    1. 切换到工作目录：d:/tonghuashun
    2. 下载最新季度财报：
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 银行 \\
         --report-type all \\
         --latest \\
         --output financial_reports/banking/
    
    3. 下载其他重点行业：
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 电子 \\
         --report-type annual semi \\
         --latest \\
         --output financial_reports/electronics/
    
    4. 统计下载结果：
       - 显示下载文件数量
       - 输出保存路径
    
    完成后，财务报表将保存在 financial_reports/ 目录。
  cwds: ["d:/tonghuashun"]
  status: ACTIVE
  validFrom: "2026-04-15"

# ========================================
# 年报集中下载（年度）
# ========================================

年报集中下载:
  name: 年度财务报表集中下载
  schedule: "FREQ=YEARLY;BYMONTH=5;BYMONTHDAY=1;BYHOUR=9;BYMINUTE=0"  # 每年5月1日9:00执行
  prompt: |
    执行年度财务报表集中下载任务：
    
    1. 切换到工作目录：d:/tonghuashun
    
    2. 批量下载重点行业年报：
       # 银行业
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 银行 \\
         --report-type annual \\
         --year 2025 \\
         --output financial_reports/annual_2025/banking/
       
       # 医药生物
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 医药生物 \\
         --report-type annual \\
         --year 2025 \\
         --output financial_reports/annual_2025/pharma/
       
       # 电子
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 电子 \\
         --report-type annual \\
         --year 2025 \\
         --output financial_reports/annual_2025/electronics/
       
       # 食品饮料
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --industry 食品饮料 \\
         --report-type annual \\
         --year 2025 \\
         --output financial_reports/annual_2025/food/
    
    3. 生成下载报告：
       - 统计各行业下载文件数
       - 列出失败的公司
       - 输出总文件大小
    
    完成后，年报将按行业保存在 financial_reports/annual_2025/ 目录。
  cwds: ["d:/tonghuashun"]
  status: ACTIVE
  validFrom: "2026-05-01"
  validUntil: "2026-05-31"

