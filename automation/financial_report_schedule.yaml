       result = analyzer.analyze_all_industries()
       
       # 获取L1级龙头股代码
       l1_leaders = result[result['行业级别'] == 'L1']['龙头股代码'].tolist()
       leader_codes = [code.split('.')[0] for code in l1_leaders if pd.notna(code)]
    
    3. 下载龙头股最新报告：
       python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
         --stock [龙头股代码列表] \\
         --report-type annual semi \\
