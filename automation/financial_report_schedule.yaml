# ========================================
# 全市场年度报告（一次性任务）
# ========================================

全市场年报下载:
  name: 全市场年度报告下载（2025年度）
  schedule: "FREQ=ONCE;scheduledAt=2026-05-15T02:00"  # 一次性任务
  prompt: |
    执行全市场年度报告下载任务（大规模任务，建议夜间执行）：
    
    1. 切换到工作目录：d:/tonghuashun
    
    2. 下载所有申万一级行业的2025年年报：
       # 按行业分批下载（避免单次任务过大）
       industries = ['银行', '非银金融', '医药生物', '电子', '计算机', 
                     '食品饮料', '汽车', '电力设备', '有色金属', '基础化工',
                     '机械设备', '国防军工', '通信', '传媒', '公用事业',
                     '交通运输', '房地产', '建筑装饰', '建筑材料', '钢铁',
                     '煤炭', '石油石化', '农林牧渔', '家用电器', '纺织服饰',
                     '轻工制造', '商贸零售', '社会服务', '美容护理', '综合', '环保']
       
       for industry in industries:
           python skills/申万行业龙头股分析/src/financial_report_downloader.py \\
             --industry {industry} \\
             --report-type annual \\
             --year 2025 \\
             --output financial_reports/all_annual_2025/{industry}/
    
    3. 生成下载统计报告：
       - 各行业下载文件数
       - 总文件大小
       - 失败清单
    
    完成后，全市场年报将保存在 financial_reports/all_annual_2025/ 目录。
  cwds: ["d:/tonghuashun"]
  status: ACTIVE
  maxDurationMinutes: 300  # 最大执行时间300分钟

