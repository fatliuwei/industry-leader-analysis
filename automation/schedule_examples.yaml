# 定时任务配置示例
# 
# 使用方法：
# 1. 在 CodeBuddy 环境中，使用 automation_update 工具创建定时任务
# 2. 或者在命令行中运行: python src/cli.py schedule --name "任务名" --schedule "定时规则" --prompt "任务提示"

# ========================================
# 每日数据更新任务
# ========================================

每日更新:
  name: 行业龙头股每日更新
  schedule: "FREQ=DAILY;BYHOUR=18;BYMINUTE=0"  # 每天18:00执行
  prompt: |
    执行每日行业龙头股数据更新任务：
    1. 获取最新的申万行业分类数据
    2. 更新所有行业的龙头股市值数据
    3. 获取最新的财务指标（ROE、净利率等）
    4. 生成当日分析报告并保存到 reports/ 目录
    5. 输出数据统计摘要
  cwds: ["d:/tonghuashun"]
  status: ACTIVE

# ========================================
# 每周深度分析任务
# ========================================

每周分析:
  name: 行业龙头股每周深度分析
  schedule: "FREQ=WEEKLY;BYDAY=SUN;BYHOUR=20;BYMINUTE=0"  # 每周日20:00执行
  prompt: |
    执行每周深度分析任务：
    1. 完整更新所有行业数据（包括L1/L2/L3级）
    2. 对比上周数据，识别变化较大的行业
    3. 进行行业对比分析：
       - 市值TOP 20行业分析
       - ROE表现TOP 20行业分析
       - 新兴行业动态跟踪
    4. 生成周度深度分析报告
    5. 输出本周重点关注行业清单
  cwds: ["d:/tonghuashun"]
  status: ACTIVE

# ========================================
# 月度财报更新任务
# ========================================

月度财报:
  name: 行业龙头股月度财报更新
  schedule: "FREQ=MONTHLY;BYMONTHDAY=1;BYHOUR=9;BYMINUTE=0"  # 每月1日9:00执行
  prompt: |
    执行月度财报更新任务：
    1. 获取最新季报数据（ROE、净利率、营收增长等）
    2. 更新所有行业的财务指标
    3. 对比上月数据，识别财务指标变化：
       - ROE提升超过5%的行业
       - 净利率改善的行业
       - 营收增速加快的行业
    4. 生成月度财务分析报告
    5. 标注需要重点关注的行业和个股
  cwds: ["d:/tonghuashun"]
  status: ACTIVE

# ========================================
# 季度深度研究任务
# ========================================

季度研究:
  name: 行业龙头股季度深度研究
  schedule: "FREQ=MONTHLY;BYMONTH=1,4,7,10;BYMONTHDAY=15;BYHOUR=10;BYMINUTE=0"  # 每季度中旬执行
  prompt: |
    执行季度深度研究任务：
    1. 完整更新所有数据（行业分类、成分股、财务指标）
    2. 季度行业配置建议：
       - 大市值行业龙头配置建议
       - 高ROE行业筛选和推荐
       - 新兴细分赛道机会挖掘
    3. 季度对比分析：
       - 行业市值排名变化
       - ROE排名变化
       - 新晋龙头股识别
    4. 生成季度投资策略报告
    5. 输出下季度重点关注的行业清单
  cwds: ["d:/tonghuashun"]
  status: ACTIVE

# ========================================
# 自定义定时任务示例
# ========================================

自定义任务:
  name: 自定义行业分析任务
  schedule: "FREQ=WEEKLY;BYDAY=MO,WE,FRI;BYHOUR=15;BYMINUTE=30"  # 每周一三五15:30执行
  prompt: |
    执行自定义行业分析任务：
    1. 获取指定行业的最新数据
    2. 对比历史数据
    3. 生成分析报告
  cwds: ["d:/tonghuashun"]
  status: PAUSED  # 暂停状态

# ========================================
# 工作日日报任务
# ========================================

工作日日报:
  name: 行业龙头股工作日日报
  schedule: "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=17;BYMINUTE=0"  # 工作日17:00执行
  prompt: |
    执行工作日日报任务：
    1. 获取当日市值数据
    2. 识别市值变化超过5%的行业
    3. 生成当日简要报告：
       - 市值TOP 10行业
       - 市值增长最快的行业
       - 需要关注的异常变化
    4. 输出日报摘要
  cwds: ["d:/tonghuashun"]
  status: ACTIVE

# ========================================
# 任务有效期设置示例
# ========================================

限时任务:
  name: 限时行业分析任务
  schedule: "FREQ=DAILY;BYHOUR=16;BYMINUTE=0"
  prompt: |
    执行限时分析任务
  cwds: ["d:/tonghuashun"]
  status: ACTIVE
  validFrom: "2026-04-15"  # 任务生效日期
  validUntil: "2026-06-15"  # 任务失效日期
